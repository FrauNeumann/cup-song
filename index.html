let selected = null;
const gallery=document.getElementById('gallery');

images.forEach(src=>{
 const im=document.createElement('img');
 im.src=src;
 im.className='thumb';
 im.onclick=()=>{
   document.querySelectorAll('.thumb').forEach(x=>x.classList.remove('sel'));
   im.classList.add('sel');
   selected=src;
 };
 gallery.appendChild(im);
});

document.querySelectorAll('.slot').forEach(slot=>{
 const del=slot.querySelector('.del');
 del.onclick=(e)=>{
   e.stopPropagation();
   slot.classList.remove('filled');
   [...slot.querySelectorAll('img')].forEach(x=>x.remove());
 };

 slot.onclick=()=>{
   if(!selected) return;
   [...slot.querySelectorAll('img')].forEach(x=>x.remove());
   const img=document.createElement('img');
   img.src=selected;
   slot.appendChild(img);
   slot.appendChild(del);
   slot.classList.add('filled');
 };
});

function resetAll(){
 document.querySelectorAll('.slot').forEach(s=>{
   s.classList.remove('filled');
   [...s.querySelectorAll('img')].forEach(x=>x.remove());
 });
}

function toggleFull(){
 if(!document.fullscreenElement){
   document.documentElement.requestFullscreen?.();
 } else {
   document.exitFullscreen?.();
 }
}
